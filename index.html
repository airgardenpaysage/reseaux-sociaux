<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Garden</title>
    <!-- Chargement des icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8); /* Semi-transparent pour voir le fond */
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            /* --- ZONE LOGO EN FOND --- */
            background-image: url('logo.png'); /* Remplace par le nom exact de ton fichier image */
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain; 
            background-attachment: fixed;
            /* ------------------------ */
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Effet de flou sur le fond pour que le logo ne gêne pas la lecture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.7); /* Voile sombre sur le logo */
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 1;
        }

        h1 { font-size: 2.2rem; margin-bottom: 10px; }
        p { font-size: 1rem; opacity: 0.8; margin-bottom: 30px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-card {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* Espace entre l'icône et le texte */
            backdrop-filter: blur(5px); /* Flou sous les boutons */
        }

        .link-card i {
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .link-card:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Air Garden</h1>
        <p>Bienvenue sur mon espace personnel</p>

        <div class="links">
            <a href="https://www.instagram.com/airgarden.fr/?hl=fr" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.linkedin.com/in/air-garden-5b4390119/" class="link-card" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
            <a href="https://www.tiktok.com/@airgarden_paysage?lang=fr" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://www.youtube.com/@airgarden_paysage" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="mailto:rg.airgarden@gmail.com@gmail.com" class="link-card">
                <i class="fas fa-envelope"></i> Contact Email
            </a>
        </div>
    </div>

</body>
</html>
