<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Garden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 350px;
            text-align: center;
            margin-top: 20px;
        }

        .logo-header {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #000000; }
        p { font-size: 1rem; color: #666; margin-bottom: 35px; font-weight: 500; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-card {
            background-color: #ffffff;
            color: #1a1a1a;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }

        .link-card:hover {
            background-color: #1a1a1a;
            color: #ffffff;
        }

        i { width: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png?v=final" class="logo-header" alt="Logo Air Garden">
        <h1>Air Garden</h1>
        <p>Création, Aménagement & Entretien</p>
        
        <div class="links">
            <a href="https://www.instagram.com/airgarden.fr/?hl=fr" class="link-card" target="_blank">Instagram</a>           
            <a href="https://www.linkedin.com/in/air-garden-5b4390119/" class="link-card" target="_blank">LinkedIn</a>
            <a href="https://www.tiktok.com/@airgarden_paysage?lang=fr" class="link-card" target="_blank">TikTok</a>
            <a href="https://www.youtube.com/@airgarden_paysage" class="link-card" target="_blank">YouTube</a>
            <a href="mailto:rg.garden@gmail.com" class="link-card"><i class="fas fa-envelope"></i> Contactez-moi</a>
        </div>
    </div>
</body>
</html>
