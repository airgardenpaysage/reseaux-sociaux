<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Garden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.6); /* Boutons un peu plus transparents */
            --text-color: #ffffff;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            /* --- FORCE LA MISE À JOUR ICI --- */
            background-image: url('logo.png?v=2');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 90%; 
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            /* LUMINOSITÉ MAX : Passage à 0.15 */
            background: rgba(15, 23, 42, 0.15); 
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 1;
        }

        h1 { 
            font-size: 2.8rem; 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8); /* Ombre forte pour lire sur le logo clair */
        }

        .link-card {
            background-color: var(--card-bg);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .link-card:hover {
            background-color: var(--accent-color);
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Air Garden</h1>
        <p>Bienvenue sur mon espace personnel</p>
        <div class="links">
            <a href="https://www.instagram.com/airgarden.fr/?hl=fr" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.linkedin.com/in/air-garden-5b4390119/" class="link-card" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
            <a href="https://www.tiktok.com/@airgarden_paysage?lang=fr" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://www.youtube.com/@airgarden_paysage" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="mailto:rg.airgarden@gmail.com@gmail.com" class="link-card">
                <i class="fas fa-envelope"></i> Contact Email</a>
        </div>
    </div>
</body>
</html>
