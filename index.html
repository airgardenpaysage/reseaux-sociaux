<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Garden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            /* --- LE TRUC POUR FORCER LA MISE À JOUR --- */
            background-image: linear-gradient(rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.1)), url('logo.png?refresh=1');
            /* ----------------------------------------- */
            background-position: center;
            background-repeat: no-repeat;
            background-size: 95%; 
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { 
            font-size: 2.8rem; 
            text-shadow: 2px 2px 10px rgba(0,0,0,1); /* Ombre très forte pour lire sur le logo clair */
            margin-bottom: 5px;
        }

        p {
            text-shadow: 1px 1px 5px rgba(0,0,0,1);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .link-card {
            background: rgba(15, 23, 42, 0.4); /* Très transparent */
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            backdrop-filter: blur(12px); /* Effet verre dépoli maximum */
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .link-card:hover {
            background-color: var(--accent-color);
            color: #000;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Air Garden</h1>
        <p>Bienvenue sur mon espace personnel</p>
        <div class="links">
            <a href="https://www.instagram.com/airgarden.fr/?hl=fr" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.linkedin.com/in/air-garden-5b4390119/" class="link-card" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
            <a href="https://www.tiktok.com/@airgarden_paysage?lang=fr" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://www.youtube.com/@airgarden_paysage" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="mailto:rg.airgarden@gmail.com@gmail.com" class="link-card">
                <i class="fas fa-envelope"></i> Contact Email</a>
        </div>
    </div>
</body>
</html>
