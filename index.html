<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Garden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligne le contenu vers le haut */
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 350px;
            text-align: center;
            margin-top: 20px;
        }

        /* --- LE LOGO PLACÉ AU-DESSUS --- */
        .logo-header {
            width: 180px; /* Taille ajustable de votre logo */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        h1 { 
            font-size: 2.2rem; 
            margin: 0 0 5px 0;
        }

        p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 35px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--card-bg);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }

        .link-card:hover {
            background-color: var(--accent-color);
            color: #0f172a;
            transform: translateY(-2px);
        }

        i { width: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Votre logo s'affiche ici, tout en haut -->
        <img src="logo.png?v=4" class="logo-header" alt="Logo Air Garden">

        <h1>Air Garden</h1>
        <p>Bienvenue sur mon espace personnel</p>
        
        <div class="links">
            <a href="https://www.instagram.com/airgarden.fr/?hl=fr" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.linkedin.com/in/air-garden-5b4390119/" class="link-card" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
            <a href="https://www.tiktok.com/@airgarden_paysage?lang=fr" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://www.youtube.com/@airgarden_paysage" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="mailto:rg.airgarden@gmail.com@gmail.com" class="link-card">
                <i class="fas fa-envelope"></i> Contact Email</a>
        </div>
    </div>

</body>
</html>
